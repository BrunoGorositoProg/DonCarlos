<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Don Carlos</title>
  <link rel="stylesheet" href="admin.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body>

<header class="admin-header">
  <div class="back-btn" onclick="volver()">←</div>
  <img src="./assets/Logo.png" class="logo-admin" />
</header>

<div class="admin-container">

  <!-- PRODUCTOS -->
  <div class="section">
    <h2>Productos</h2>
    <div id="admin-productos"></div>
  </div>

  <!-- GENERAR VENTA -->
  <div class="section">
    <h2>Generar Venta</h2>
    <button class="generar-btn" onclick="abrirVenta()">Generar Venta</button>
  <!-- MODAL -->
  <div id="modal-venta" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title"></h2>

      <div id="modal-productos"></div>

      <button class="add-btn" onclick="accionModal()">
        Confirmar
      </button>

      <button class="edit-btn" onclick="cerrarVenta()">
        Cancelar
      </button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="section">
    <h2>Historial</h2>
    <div id="historial"></div>
  </div>

  <div class="section">
  <h2>Ingresos y Egresos</h2>

  <button class="generar-btn" onclick="abrirMovimiento()">
    Agregar Movimiento
  </button>

  <div id="movimientos"></div>
</div>

</div>

<script src="./data/db.js"></script>
<script src="./data/products.js"></script>
<script src="./admin.js"></script>

</body>
</html>
