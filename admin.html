<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Don Carlos</title>
  <link rel="stylesheet" href="admin.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body>

<header class="admin-header">
  <div class="back-btn" onclick="volver()">←</div>
  <img src="./assets/Logo.png" class="logo-admin" />
</header>

<div class="admin-container">

  <!-- PRODUCTOS -->
  <div class="section">
    <h2>Productos</h2>
    <div id="admin-productos"></div>
  </div>

    <!-- GENERAR VENTA -->
  <div class="section">
      <h2>Generar Venta</h2>
      <button class="generar-btn" onclick="abrirModalVenta()">Generar Venta</button>
  </div>

    <!-- MODAL -->
  <div id="modal-venta" class="modal hidden">
      <div class="modal-content">

        <h2 id="modal-title">Nueva Venta</h2>

        <!-- 🔥 IMPORTANTE -->
          <div id="modal-productos" class="modal-body"></div>
          <div id="venta-resumen"></div>
        <button class="add-btn" onclick="accionModal()">Confirmar</button>
        <button class="edit-btn" onclick="cerrarModal()">Cancelar</button>

      </div>
</div>
<!-- HISTORIAL -->
<div class="section">
  <h2>Historial</h2>

  <div class="filtro-mes-container">
    <label>Filtrar por mes:</label>
    <select id="filtro-mes" onchange="cambiarMes()"></select>
  </div>

  <!-- 💰 RESUMEN DEL MES -->
  <div id="resumen-mes" class="resumen-box"></div>

  <!-- 📜 LISTA DE FACTURAS -->
  <div id="historial"></div>

  <!-- 📦 PRODUCTOS VENDIDOS -->
  <h3>Productos vendidos</h3>
  <div id="top-productos" class="top-productos"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./data/products.js"></script>
<script src="./data/db.js"></script>
<script src="./admin.js"></script>

</body>
</html>
